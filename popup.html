<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 280px;
        padding: 10px;
      }
      label {
        display: block;
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <h3>Auto Fullpage Screenshot</h3>
    <div>
      <label
        ><input id="enable" type="checkbox" /> Enable auto-capture on
        navigation</label
      >
    </div>
    <div>
      <label
        ><input id="clickCapture" type="checkbox" /> Capture on Shift+Click
        (anywhere)</label
      >
    </div>
    <hr />
    <div>
      <label>Manual capture delay (seconds)</label>
      <input id="delay" type="number" min="0" value="3" style="width: 80px" />
      <button id="take">Take after delay</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
